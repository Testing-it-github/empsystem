{%extends "emp/base.html"%} {% block body_block %}

<form method="post">
  {% csrf_token %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <h2 class="text-center mb-4">Add News</h2>

        <div class="row mb-4 align-items-center">
          <div class="col-md-2">
            <label class="form-label"><h3>Title</h3></label>
          </div>
          <div class="col-md-10">{{form.title}}</div>
        </div>

        <div class="row mb-4 align-items-center">
          <div class="col-md-2">
            <label class="form-label"><h3>Detail</h3></label>
          </div>
          <div class="col-md-9">{{form.details}}</div>
        </div>

        <div class="text-center">
          <a href="{% url 'news'%}"
            ><button type="submit" class="btn btn-primary px-4">
              Submit
            </button></a
          >
        </div>
      </div>
    </div>
  </div>
</form>
{%endblock%}
