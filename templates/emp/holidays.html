{%extends "emp/base.html"%} {% block body_block %}

<div style="padding: 40px">
  <h2 style="font-weight: 700; text-align: center">HOLIDAYS CALENDAR</h2>

  <table style="width: 100%; border-collapse: collapse; margin-top: 20px">
    <thead>
      <tr style="background-color: #f97316">
        <th style="color: white; padding: 12px; border: 1px solid #ccc">
          DATE
        </th>
        <th style="color: white; padding: 12px; border: 1px solid #ccc">
          DETAILS
        </th>
      </tr>
    </thead>
    <tbody>
      {% for item in calendar %}
      <tr style="background-color: #fff3e0">
        <td style="padding: 10px; border: 1px solid #ccc">{{ item.Date }}</td>
        <td style="padding: 10px; border: 1px solid #ccc">
          {{ item.Occasion }}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
