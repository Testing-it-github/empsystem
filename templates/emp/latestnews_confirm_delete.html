{%extends "emp/base.html"%} {% block body_block %}

<center>
  <h3 class="mt-3">Are you sure to delete {{ object.title }}?</h3>

  <form method="post">
    {% csrf_token %}
    <button class="mt-3" type="submit">Yes</button><br />
  </form>

  <button class="mt-3">
    <a href="{% url 'detail' object.pk %}">No, back to details</a>
  </button>
</center>

{% endblock %}
